name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: gradle

      - name: 授予gradlew的执行权限
        run: chmod +x gradlew

      - name: 构建Debug版apk
        run: ./gradlew assembleDebug

      - name: 上传apk
        uses: actions/upload-artifact@v4
        with:
          name: OptimizedMG-debug
          path: app/build/outputs/apk/debug/*.apk
